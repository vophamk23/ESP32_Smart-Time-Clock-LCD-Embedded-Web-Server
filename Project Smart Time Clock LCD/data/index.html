<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Smart Clock</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- ========== HEADER ========== -->
    <header>
      <div class="header-left">
        <span class="brand">SMART CLOCK</span>
        <span class="sys-info"
          ><span id="heapInfo">HEAP:--</span> &nbsp; UP:<span id="uptimeInfo"
            >--:--:--</span
          ></span
        >
      </div>
      <div class="header-right">
        <span class="sensor-inline"
          >🌡 <span id="tempVal">--</span>°C &nbsp; 💧<span id="humiVal"
            >--</span
          >%</span
        >
      </div>
    </header>

    <!-- ========== LCD SCREEN ========== -->
    <main>
      <div class="lcd-bezel">
        <div class="lcd-screen">
          <div class="scanlines"></div>

          <!-- PANEL: ĐỒNG HỒ (mặc định) -->
          <div class="panel active" id="panel-clock">
            <div class="lcd-label">DATE / TIME</div>
            <div class="lcd-big" id="clockDisplay">--:--:--</div>
            <div class="lcd-sub" id="dateDisplay">--/--/---- ---</div>
          </div>

          <!-- PANEL: NHIỆT ĐỘ -->
          <div class="panel" id="panel-sensor">
            <div class="lcd-label">TEMP / HUMIDITY</div>
            <div class="lcd-big" id="tempVal2">TEMP: -- &deg;C</div>
            <div class="lcd-big" id="humiVal2">HUMI: --%</div>
          </div>

          <!-- PANEL: BÁO THỨC -->
          <div class="panel" id="panel-alarm">
            <div class="lcd-label">ALARM</div>
            <div class="lcd-big" id="alarmDisplay">--:--</div>
            <div class="lcd-sub" id="alarmStatus">WAITING...</div>
          </div>

          <!-- PANEL: BẤM GIỜ -->
          <div class="panel" id="panel-sw">
            <div class="lcd-label">STOPWATCH</div>
            <div class="lcd-big" id="swDisplay">00:00:00.00</div>
            <div class="laps" id="lapsList"></div>
          </div>

          <!-- PANEL: ĐẾM NGƯỢC -->
          <div class="panel" id="panel-cd">
            <div class="lcd-label">COUNTDOWN</div>
            <div class="lcd-big" id="cdDisplay">00:00:00</div>
            <div class="lcd-sub" id="cdStatus">SET TIME</div>
          </div>

          <!-- Pixel cursor blink -->
          <div class="lcd-cursor"></div>
        </div>

        <!-- Screw corners -->
        <div class="screw tl"></div>
        <div class="screw tr"></div>
        <div class="screw bl"></div>
        <div class="screw br"></div>
      </div>

      <!-- ========== CONTROL PANEL ========== -->
      <div class="control-panel">
        <!-- MODE BUTTONS -->
        <div class="btn-group mode-group">
          <div class="btn-label">MODE SELECT</div>
          <div class="mode-row">
            <button
              class="mode-btn active"
              data-mode="1"
              onclick="selectMode(1)"
            >
              <span class="btn-icon">🕐</span
              ><span class="btn-text">CLOCK</span>
            </button>
            <button class="mode-btn" data-mode="0" onclick="selectMode(0)">
              <span class="btn-icon">🌡</span
              ><span class="btn-text">SENSOR</span>
            </button>
            <button class="mode-btn" data-mode="2" onclick="selectMode(2)">
              <span class="btn-icon">⏰</span
              ><span class="btn-text">ALARM</span>
            </button>
            <button class="mode-btn" data-mode="3" onclick="selectMode(3)">
              <span class="btn-icon">⏱</span
              ><span class="btn-text">STOPWATCH</span>
            </button>
            <button class="mode-btn" data-mode="4" onclick="selectMode(4)">
              <span class="btn-icon">⌛</span
              ><span class="btn-text">COUNTDOWN</span>
            </button>
          </div>
        </div>

        <!-- ACTION AREA — hiển thị tuỳ mode -->
        <div class="action-area">
          <!-- ALARM CONTROLS -->
          <div class="action-group hidden" id="action-alarm">
            <div class="input-row">
              <label>HH</label>
              <input type="number" id="alarmH" min="0" max="23" value="7" />
              <span class="sep">:</span>
              <label>MM</label>
              <input type="number" id="alarmM" min="0" max="59" value="0" />
              <button class="act-btn green" onclick="setAlarm()">SET</button>
            </div>
            <button class="act-btn red wide" onclick="stopAlarm()">
              🔕 STOP ALARM
            </button>
          </div>

          <!-- STOPWATCH CONTROLS -->
          <div class="action-group hidden" id="action-sw">
            <div class="btn-row">
              <button class="act-btn green" onclick="swStart()">▶ START</button>
              <button class="act-btn yellow" onclick="swStop()">
                ⏸ LAP/STOP
              </button>
              <button class="act-btn gray" onclick="swReset()">↺ RESET</button>
            </div>
          </div>

          <!-- COUNTDOWN CONTROLS -->
          <div class="action-group hidden" id="action-cd">
            <div class="input-row">
              <label>HH</label>
              <input type="number" id="cdH" min="0" max="99" value="0" />
              <span class="sep">:</span>
              <label>MM</label>
              <input type="number" id="cdM" min="0" max="59" value="5" />
              <span class="sep">:</span>
              <label>SS</label>
              <input type="number" id="cdS" min="0" max="59" value="0" />
              <button class="act-btn green" onclick="cdSet()">SET</button>
            </div>
            <div class="btn-row">
              <button class="act-btn green" onclick="cdStart()">▶ START</button>
              <button class="act-btn yellow" onclick="cdStop()">⏸ STOP</button>
              <button class="act-btn gray" onclick="cdReset()">↺ RESET</button>
            </div>
          </div>

          <!-- CLOCK / SENSOR: no controls -->
          <div class="action-group" id="action-none">
            <div class="no-action">── No controls for this mode ──</div>
          </div>
        </div>
      </div>
    </main>

    <!-- TOAST -->
    <div class="toast hidden" id="toast"></div>

    <script src="/app.js"></script>
  </body>
</html>
